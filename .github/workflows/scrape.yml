name: Scrape and Send News

on:
  # Run every hour
  schedule:
    - cron: '0 * * * *'  # Every hour at minute 0
  
  # Allow manual trigger
  workflow_dispatch:

  # Also run on push to main (for testing)
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'requirements.txt'

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify secrets are set
        run: |
          echo "=== Checking secrets ==="
          if [ -z "${{ secrets.TELEGRAM_BOT_TOKEN }}" ]; then
            echo "❌ TELEGRAM_BOT_TOKEN is NOT set!"
          else
            echo "✅ TELEGRAM_BOT_TOKEN is set (length: ${#TELEGRAM_BOT_TOKEN})"
          fi
          if [ -z "${{ secrets.TELEGRAM_TECH_CHANNEL }}" ]; then
            echo "❌ TELEGRAM_TECH_CHANNEL is NOT set!"
          else
            echo "✅ TELEGRAM_TECH_CHANNEL is set: ${{ secrets.TELEGRAM_TECH_CHANNEL }}"
          fi
          if [ -z "${{ secrets.TELEGRAM_SCIENCE_CHANNEL }}" ]; then
            echo "❌ TELEGRAM_SCIENCE_CHANNEL is NOT set!"
          else
            echo "✅ TELEGRAM_SCIENCE_CHANNEL is set"
          fi
          if [ -z "${{ secrets.TELEGRAM_AI_CHANNEL }}" ]; then
            echo "❌ TELEGRAM_AI_CHANNEL is NOT set!"
          else
            echo "✅ TELEGRAM_AI_CHANNEL is set"
          fi
          if [ -z "${{ secrets.TELEGRAM_MILITARY_CHANNEL }}" ]; then
            echo "❌ TELEGRAM_MILITARY_CHANNEL is NOT set!"
          else
            echo "✅ TELEGRAM_MILITARY_CHANNEL is set"
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      
      - name: Run scraper
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_TECH_CHANNEL: ${{ secrets.TELEGRAM_TECH_CHANNEL }}
          TELEGRAM_SCIENCE_CHANNEL: ${{ secrets.TELEGRAM_SCIENCE_CHANNEL }}
          TELEGRAM_AI_CHANNEL: ${{ secrets.TELEGRAM_AI_CHANNEL }}
          TELEGRAM_MILITARY_CHANNEL: ${{ secrets.TELEGRAM_MILITARY_CHANNEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENABLE_TECH_NEWS: 'true'
          ENABLE_SCIENCE_NEWS: 'true'
          ENABLE_AI_NEWS: 'true'
          ENABLE_MILITARY_NEWS: 'true'
          LOG_LEVEL: 'DEBUG'
        run: |
          echo "=== Starting scraper ==="
          python -c "import logging; logging.basicConfig(level=logging.DEBUG, format='%(asctime)s - %(name)s - %(levelname)s - %(message)s'); from src.main import AutoMonitor; m = AutoMonitor(); m.run_scrapers(); print('=== Scraper finished ===')"
      
      - name: Show cache contents
        run: |
          echo "=== Cache file contents ==="
          cat data/sent_cache.json || echo "No cache file found"
      
      - name: Commit updated cache
        timeout-minutes: 2
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/sent_cache.json || true
          git diff --staged --quiet || git commit -m "chore: update sent cache [skip ci]"
          git pull --rebase || true
          git push || echo "Push failed, continuing anyway"
